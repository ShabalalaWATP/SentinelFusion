x-node-image: &node_image node:22-alpine@sha256:9385cd9f3001dfc3431e8ead12c43e9e1f87cc1b9b5c6cfd0f73865d405b27c4

services:
  api:
    image: *node_image
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install --frozen-lockfile && pnpm --filter @aisstream/api dev"
    ports:
      - "127.0.0.1:4000:4000"
    environment:
      NODE_ENV: development
      PORT: 4000
      HOST: 0.0.0.0
      TRUST_PROXY: false
      CORS_ORIGINS: http://localhost:5173
      AIS_MODE: ${AIS_MODE:-live}
      ANALYSIS_MODE: ${ANALYSIS_MODE:-live}
      AISSTREAM_URL: wss://stream.aisstream.io/v0/stream
      AISSTREAM_BBOXES: '${AISSTREAM_BBOXES:-[[[-90,-180],[90,180]]]}'
      AISSTREAM_FILTER_MMSI: ${AISSTREAM_FILTER_MMSI:-}
      AISSTREAM_FILTER_MESSAGE_TYPES: ${AISSTREAM_FILTER_MESSAGE_TYPES:-PositionReport,StandardClassBPositionReport,ExtendedClassBPositionReport,ShipStaticData,StaticDataReport}
      AIS_REPLAY_FILE: ${AIS_REPLAY_FILE:-}
      AISSTREAM_API_KEY: ${AISSTREAM_API_KEY:-}
      FLIGHT_MODE: ${FLIGHT_MODE:-mock}
      FLIGHT_PROVIDER: ${FLIGHT_PROVIDER:-mock}
      FLIGHT_API_BASE_URL: ${FLIGHT_API_BASE_URL:-}
      FLIGHT_API_KEY: ${FLIGHT_API_KEY:-}
      FLIGHT_BBOXES: '${FLIGHT_BBOXES:-[[[-90,-180],[90,180]]]}'
      FLIGHT_POLL_INTERVAL_MS: ${FLIGHT_POLL_INTERVAL_MS:-90000}
      FLIGHT_STALE_AFTER_SECONDS: ${FLIGHT_STALE_AFTER_SECONDS:-60}
      FLIGHT_PROVIDER_TIMEOUT_MS: ${FLIGHT_PROVIDER_TIMEOUT_MS:-10000}
      OPEN_SKY_CLIENT_ID: ${OPEN_SKY_CLIENT_ID:-}
      OPEN_SKY_CLIENT_SECRET: ${OPEN_SKY_CLIENT_SECRET:-}
      MARINE_WEATHER_MODE: ${MARINE_WEATHER_MODE:-live}
      MARINE_WEATHER_TIMEOUT_MS: ${MARINE_WEATHER_TIMEOUT_MS:-10000}
      MARINE_WEATHER_CACHE_SECONDS: ${MARINE_WEATHER_CACHE_SECONDS:-900}
      MARINE_WEATHER_CACHE_MAX_ENTRIES: ${MARINE_WEATHER_CACHE_MAX_ENTRIES:-200}
      FIRMS_MODE: ${FIRMS_MODE:-live}
      FIRMS_MAP_KEY: ${FIRMS_MAP_KEY:-}
      FIRMS_SOURCE: ${FIRMS_SOURCE:-VIIRS_SNPP_NRT}
      FIRMS_DAY_RANGE: ${FIRMS_DAY_RANGE:-1}
      FIRMS_TIMEOUT_MS: ${FIRMS_TIMEOUT_MS:-10000}
      FIRMS_CACHE_SECONDS: ${FIRMS_CACHE_SECONDS:-900}
      FIRMS_CACHE_MAX_ENTRIES: ${FIRMS_CACHE_MAX_ENTRIES:-200}
      FIRMS_MAX_DETECTIONS: ${FIRMS_MAX_DETECTIONS:-150}
      AIRPORT_CONTEXT_MODE: ${AIRPORT_CONTEXT_MODE:-live}
      AIRPORT_CONTEXT_TIMEOUT_MS: ${AIRPORT_CONTEXT_TIMEOUT_MS:-10000}
      AIRPORT_CONTEXT_CACHE_SECONDS: ${AIRPORT_CONTEXT_CACHE_SECONDS:-86400}
      AIRPORT_CONTEXT_MAX_RESULTS: ${AIRPORT_CONTEXT_MAX_RESULTS:-8}
      AIRPORT_CONTEXT_MAX_RUNWAYS_PER_AIRPORT: ${AIRPORT_CONTEXT_MAX_RUNWAYS_PER_AIRPORT:-4}
      CONFLICT_CONTEXT_MODE: ${CONFLICT_CONTEXT_MODE:-live}
      CONFLICT_CONTEXT_PROVIDER: ${CONFLICT_CONTEXT_PROVIDER:-acled}
      CONFLICT_CONTEXT_LOOKBACK_DAYS: ${CONFLICT_CONTEXT_LOOKBACK_DAYS:-14}
      CONFLICT_CONTEXT_TIMEOUT_MS: ${CONFLICT_CONTEXT_TIMEOUT_MS:-10000}
      CONFLICT_CONTEXT_CACHE_SECONDS: ${CONFLICT_CONTEXT_CACHE_SECONDS:-900}
      CONFLICT_CONTEXT_CACHE_MAX_ENTRIES: ${CONFLICT_CONTEXT_CACHE_MAX_ENTRIES:-200}
      CONFLICT_CONTEXT_MAX_RESULTS: ${CONFLICT_CONTEXT_MAX_RESULTS:-50}
      ACLED_ACCESS_TOKEN: ${ACLED_ACCESS_TOKEN:-}
      ACLED_USERNAME: ${ACLED_USERNAME:-}
      ACLED_PASSWORD: ${ACLED_PASSWORD:-}
      SATELLITE_CONTEXT_MODE: ${SATELLITE_CONTEXT_MODE:-live}
      SATELLITE_CONTEXT_PROVIDER: ${SATELLITE_CONTEXT_PROVIDER:-nasa-gibs}
      SATELLITE_CONTEXT_LAYER: ${SATELLITE_CONTEXT_LAYER:-VIIRS_SNPP_CorrectedReflectance_TrueColor}
      SATELLITE_CONTEXT_DATE_OFFSET_DAYS: ${SATELLITE_CONTEXT_DATE_OFFSET_DAYS:-1}
      SATELLITE_CONTEXT_IMAGE_SIZE: ${SATELLITE_CONTEXT_IMAGE_SIZE:-512}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4-mini}
      OPENAI_TIMEOUT_MS: ${OPENAI_TIMEOUT_MS:-20000}
      ANALYSIS_API_TOKEN: ${ANALYSIS_API_TOKEN:-}
      ALLOW_UNAUTHENTICATED_ANALYSIS: ${ALLOW_UNAUTHENTICATED_ANALYSIS:-true}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-120}
      RATE_LIMIT_WINDOW: ${RATE_LIMIT_WINDOW:-1 minute}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - .:/workspace
      - pnpm-store:/root/.local/share/pnpm/store

  web:
    image: *node_image
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install --frozen-lockfile && pnpm --filter @aisstream/web dev -- --host 0.0.0.0"
    ports:
      - "127.0.0.1:5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:4000
      VITE_WS_URL: ws://localhost:4000/ws/vessels
      VITE_FLIGHT_WS_URL: ws://localhost:4000/ws/aircraft
    depends_on:
      - api
    volumes:
      - .:/workspace
      - pnpm-store:/root/.local/share/pnpm/store

volumes:
  pnpm-store:
